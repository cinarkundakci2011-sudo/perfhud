name: Build Fabric Mod

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Download the code from the repository
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. Set up JDK 25 (Required for Minecraft 26.2 compilation)
    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'

    # 3. Automatically fetch the latest stable Gradle distribution
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 'latest'

    # 4. Run the build process
    - name: Build Mod File
      run: gradle build

    # 5. Upload the generated .jar so you can download it from GitHub
    - name: Upload Mod Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Performance-HUD-Build
        path: build/libs/perfhud-*.jar
        if-no-files-found: error
