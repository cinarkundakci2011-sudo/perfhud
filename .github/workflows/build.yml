name: Build Fabric Mod

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Download the code from the repository
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. Set up Java 25 (Required for Minecraft 26.2 compilation)
    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'

    # 3. Setup and cache Gradle to speed up subsequent builds
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    # 4. Make sure the Linux runner has permission to execute the Gradle wrapper
    - name: Grant Execute Permission for Gradlew
      run: chmod +x gradlew

    # 5. Run the build process
    - name: Build Mod File
      run: ./gradlew build

    # 6. Upload the generated .jar so you can download it from GitHub
    - name: Upload Mod Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Performance-HUD-Build
        path: build/libs/perfhud-*.jar
        if-no-files-found: error
